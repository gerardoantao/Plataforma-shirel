
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de la Vida SHIREL</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background-color: #060b13; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { color: #ffd700; }
        .tablero { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; max-width: 600px; margin: 20px auto; }
        .casilla { background: #111a2e; border: 1px solid #00e5ff; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .casilla:hover { background: #00e5ff; color: #000; }
    </style>
</head>
<body>
    <h1>JUEGO DE LA VIDA SHIREL</h1>
    <p>Selecciona un casillero para apostar</p>
    <div class="tablero" id="tablero"></div>

    <script>
        const tablero = document.getElementById('tablero');
        for (let i = 0; i <= 99; i++) {
            const div = document.createElement('div');
            div.className = 'casilla';
            div.innerText = i;
            div.onclick = () => alert('Apostando en casillero ' + i);
            tablero.appendChild(div);
        }
    </script>
</body>
</html>
